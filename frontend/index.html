<!doctype html>
<html lang="en">
  <head>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        background-color: #ffffff;
      }
      html.dark-mode, html.dark-mode body {
        background-color: #1f2937; 
      }
    </style>

    <script>
      if (localStorage.getItem('travelmap_theme') === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    </script>

    <meta charset="UTF-8" />
    <meta name="description" content="Landmark is an interactive travel planner that lets you map your trips, save locations, and track your adventures around the world." />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Landmark">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    </noscript>
    
    <link rel="icon" type="image/svg+xml" href="/pin.svg" />
    <link rel="preload" as="image" href="/auth-bg.webp" type="image/webp" fetchpriority="high">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landmark</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
